name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Get version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION=${LATEST_TAG#v}
          echo "number=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          APK_FILE=$(ls app-release*.apk | head -1)
          mv "$APK_FILE" AIVision-v${{ steps.version.outputs.number }}.apk
        
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/AIVision-*.apk

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: app/build/outputs/apk/release/AIVision-*.apk
          tag_name: v${{ steps.version.outputs.number }}
          name: AI Vision v${{ steps.version.outputs.number }}
          body: "Automated release v${{ steps.version.outputs.number }}"
          draft: false
